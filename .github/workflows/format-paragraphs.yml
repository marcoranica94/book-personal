name: Format Paragraphs
on:
  workflow_dispatch:
    inputs:
      chapter_id:
        description: 'ID capitolo da riformattare'
        required: true
      ai_provider:
        description: 'Provider AI (claude / gemini / chatgpt)'
        required: false
        default: 'claude'
jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install script dependencies
        working-directory: scripts
        run: npm install
      - name: Run paragraph formatter
        working-directory: scripts
        env:
          CHAPTER_ID: ${{ inputs.chapter_id }}
          AI_PROVIDER: ${{ inputs.ai_provider }}
          REPO_DIR: ${{ github.workspace }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node format-paragraphs.mjs
