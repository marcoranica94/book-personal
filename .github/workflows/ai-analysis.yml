name: AI Chapter Analysis

on:
  workflow_dispatch:
    inputs:
      chapter_id:
        description: 'Chapter ID to analyze (or "all" for all chapters)'
        required: true
        default: 'all'
        type: string
      include_previous:
        description: 'Include previous analysis context for progress tracking'
        required: false
        default: 'false'
        type: string
      ai_provider:
        description: 'AI provider to use: claude or gemini'
        required: false
        default: 'claude'
        type: string
      author_comment:
        description: 'Optional author note to guide the AI analysis'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Run analysis
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          CHAPTER_ID: ${{ inputs.chapter_id }}
          INCLUDE_PREVIOUS: ${{ inputs.include_previous }}
          AI_PROVIDER: ${{ inputs.ai_provider }}
          AUTHOR_COMMENT: ${{ inputs.author_comment }}
          REPO_DIR: ${{ github.workspace }}
        run: node analyze-chapter.mjs
