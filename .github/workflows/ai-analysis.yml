name: AI Chapter Analysis
on:
  workflow_dispatch:
    inputs:
      chapter_id:
        description: 'ID capitolo (o "all" per tutti)'
        required: true
        default: 'all'
      include_previous:
        description: 'Includi contesto analisi precedente (true/false)'
        required: false
        default: 'false'
      ai_provider:
        description: 'Provider AI (claude / gemini / chatgpt)'
        required: false
        default: 'claude'
      author_comment:
        description: "Nota autore per orientare l'analisi (opzionale)"
        required: false
        default: ''
      with_weakness_solutions:
        description: 'Includi soluzioni proposte per le debolezze (true/false)'
        required: false
        default: 'true'
      with_suggestion_solutions:
        description: 'Includi soluzioni proposte per i suggerimenti (true/false)'
        required: false
        default: 'true'
      with_paragraph_analysis:
        description: 'Analizza uso dei paragrafi / a capo (true/false)'
        required: false
        default: 'false'
      with_strengths:
        description: 'Includi sezione Punti di forza (true/false)'
        required: false
        default: 'true'
      with_weaknesses:
        description: 'Includi sezione Debolezze (true/false)'
        required: false
        default: 'true'
      with_suggestions:
        description: 'Includi sezione Suggerimenti (true/false)'
        required: false
        default: 'true'
      with_corrections:
        description: 'Includi sezione Correzioni (true/false)'
        required: false
        default: 'true'
      with_reader_reactions:
        description: 'Includi sezione Reazioni Lettori (true/false)'
        required: false
        default: 'true'
      with_word_frequency:
        description: 'Calcola frequenza parole (ripetizioni) del capitolo (true/false)'
        required: false
        default: 'false'
      with_show_dont_tell:
        description: "Analizza casi di 'telling' invece di 'showing' con riscritture proposte (true/false)"
        required: false
        default: 'false'
      with_verb_tense:
        description: 'Analizza coerenza tempi verbali e aggiungi correzioni di tipo verb_tense (true/false)'
        required: false
        default: 'false'
      with_characters:
        description: 'Estrai personaggi dal capitolo e aggiorna la collection /characters (true/false)'
        required: false
        default: 'false'
      custom_question:
        description: "Domanda precisa per l'IA (se impostata, esegue analisi mirata invece di quella standard)"
        required: false
        default: ''
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install script dependencies
        working-directory: scripts
        run: npm install
      - name: Run AI analysis
        working-directory: scripts
        env:
          CHAPTER_ID: ${{ inputs.chapter_id }}
          INCLUDE_PREVIOUS: ${{ inputs.include_previous }}
          AI_PROVIDER: ${{ inputs.ai_provider }}
          AUTHOR_COMMENT: ${{ inputs.author_comment }}
          WITH_WEAKNESS_SOLUTIONS: ${{ inputs.with_weakness_solutions }}
          WITH_SUGGESTION_SOLUTIONS: ${{ inputs.with_suggestion_solutions }}
          WITH_PARAGRAPH_ANALYSIS: ${{ inputs.with_paragraph_analysis }}
          WITH_STRENGTHS: ${{ inputs.with_strengths }}
          WITH_WEAKNESSES: ${{ inputs.with_weaknesses }}
          WITH_SUGGESTIONS: ${{ inputs.with_suggestions }}
          WITH_CORRECTIONS: ${{ inputs.with_corrections }}
          WITH_READER_REACTIONS: ${{ inputs.with_reader_reactions }}
          WITH_WORD_FREQUENCY: ${{ inputs.with_word_frequency }}
          WITH_SHOW_DONT_TELL: ${{ inputs.with_show_dont_tell }}
          WITH_VERB_TENSE: ${{ inputs.with_verb_tense }}
          WITH_CHARACTERS: ${{ inputs.with_characters }}
          CUSTOM_QUESTION: ${{ inputs.custom_question }}
          REPO_DIR: ${{ github.workspace }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node analyze-chapter.mjs
